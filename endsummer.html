<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>endsummer</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Orbitron',sans-serif;
    background:black;
    color:white;
}

/* Анимированный фон */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
      radial-gradient(circle,#00ffff33 0%,transparent 25%),
      radial-gradient(circle,#ff00ff33 0%,transparent 25%),
      radial-gradient(circle,#00ff8833 0%,transparent 25%);
    animation:bgMove 15s linear infinite;
}

@keyframes bgMove{
    0%{transform:translate(-10%,-10%) rotate(0deg);}
    100%{transform:translate(-10%,-10%) rotate(360deg);}
}

.container{
    position:relative;
    z-index:2;
    text-align:center;
    padding:40px;
    border-radius:30px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:
      0 0 30px #00ffff55,
      0 0 60px #ff00ff33;
}

.title{
    font-size:32px;
    margin-bottom:30px;
    text-shadow:0 0 15px cyan;
}

.timer{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.box{
    width:120px;
    height:120px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    box-shadow:
      inset 0 0 20px rgba(255,255,255,0.05),
      0 0 25px rgba(0,255,255,0.2);
    transition:0.3s;
}

.box:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:
      0 0 35px cyan,
      0 0 60px magenta;
}

.number{
    font-size:42px;
    font-weight:bold;
    text-shadow:0 0 15px cyan;
}

.label{
    margin-top:10px;
    font-size:14px;
    opacity:0.8;
    letter-spacing:2px;
}

.footer{
    margin-top:30px;
    opacity:0.7;
    font-size:13px;
}

@media(max-width:600px){
    .box{
        width:90px;
        height:90px;
    }

    .number{
        font-size:30px;
    }

    .title{
        font-size:24px;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="title">
        ДО КОНЦА ЛЕТА((
    </div>

    <div class="timer">
        <div class="box">
            <div class="number" id="days">00</div>
            <div class="label">ДНЕЙ</div>
        </div>

        <div class="box">
            <div class="number" id="hours">00</div>
            <div class="label">ЧАСОВ</div>
        </div>

        <div class="box">
            <div class="number" id="minutes">00</div>
            <div class="label">МИНУТ</div>
        </div>

        <div class="box">
            <div class="number" id="seconds">00</div>
            <div class="label">СЕКУНД</div>
        </div>
    </div>

    <div class="footer">
        Serebushka
    </div>
</div>

<script>
const targetDate = new Date("2026-08-31 00:00:00").getTime();

function updateCountdown(){

    const now = new Date().getTime();
    const distance = targetDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("days").innerHTML = days;
    document.getElementById("hours").innerHTML = hours;
    document.getElementById("minutes").innerHTML = minutes;
    document.getElementById("seconds").innerHTML = seconds;

    if(distance < 0){
        document.querySelector(".container").innerHTML = `
            <div class="title">(((</div>
        `;
    }
}

updateCountdown();
setInterval(updateCountdown,1000);
</script>

</body>
</html>
