<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Main menu</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:black;
    font-family:'Orbitron',sans-serif;
    color:white;
}

/* Фон */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
      radial-gradient(circle,#00ffff33 0%,transparent 25%),
      radial-gradient(circle,#ff00ff33 0%,transparent 25%),
      radial-gradient(circle,#00ff8833 0%,transparent 25%);
    animation:bgMove 15s linear infinite;
}

@keyframes bgMove{
    0%{
        transform:translate(-10%,-10%) rotate(0deg);
    }

    100%{
        transform:translate(-10%,-10%) rotate(360deg);
    }
}

.container{
    position:relative;
    z-index:2;
    width:95%;
    max-width:700px;
    max-height:90vh;
    display:flex;
    flex-direction:column;
    padding:40px 30px;
    border-radius:30px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:
      0 0 30px #00ffff55,
      0 0 60px #ff00ff33;
    text-align:center;
}

.title{
    font-size:32px;
    margin-bottom:15px;
    text-shadow:0 0 15px cyan;
    flex-shrink:0;
}

/* Стили для строки поиска */
.search-container {
    margin-bottom: 20px;
    flex-shrink: 0;
}

.search-input {
    width: 100%;
    padding: 14px 20px;
    border-radius: 15px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(0, 255, 255, 0.3);
    color: white;
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    outline: none;
    transition: 0.3s;
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
}

.search-input:focus {
    border-color: #ff00ff;
    box-shadow: 0 0 15px rgba(255, 0, 255, 0.4), inset 0 0 10px rgba(255, 0, 255, 0.1);
    background: rgba(255, 255, 255, 0.08);
}

.search-input::placeholder {
    color: rgba(255, 255, 255, 0.4);
    text-transform: uppercase;
    font-size: 14px;
}

/* Сетка для кнопок */
.buttons{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:15px;
    overflow-y:auto;
    padding:10px 5px;
}

.buttons::-webkit-scrollbar {
    width: 0px;
}

button{
    padding:16px 10px;
    border:none;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:15px;
    font-family:'Orbitron',sans-serif;
    cursor:pointer;
    transition:0.3s;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:
      inset 0 0 20px rgba(255,255,255,0.05),
      0 0 15px rgba(0,255,255,0.15);
    text-transform: uppercase;
}

button:hover{
    transform:scale(1.03);
    box-shadow:
      0 0 25px cyan,
      0 0 40px magenta;
}

.footer{
    margin-top:20px;
    opacity:0.7;
    font-size:13px;
    flex-shrink:0;
}

@media (max-width: 550px) {
    .buttons {
        grid-template-columns: 1fr;
    }
    .container {
        padding: 25px 20px;
    }
}

</style>
</head>
<body>

<div class="container">

    <div class="title">
        SBT
    </div>

    <!-- Поле поиска -->
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Поиск таймера..." oninput="filterButtons()">
    </div>

    <div class="buttons" id="buttonsGrid">

        <!-- Исходные 5 кнопок -->
        <button onclick="location.href='page1.html'">ТАЙМЕР ДО ЛЕТА</button>
        <button onclick="location.href='page2.html'">ТАЙМЕР ДО ДР</button>
        <button onclick="location.href='page3.html'">ТАЙМЕР ДО НГ</button>
        <button onclick="location.href='page4.html'">ТАЙМЕР ДО КОНЦА ЛЕТА</button>
        <button onclick="location.href='page5.html'">ТАЙМЕР ДО ???</button>

        <!-- Новые 15 кнопок -->
        <button onclick="location.href='page6.html'">ТАЙМЕР ДО 6</button>
        <button onclick="location.href='page7.html'">ТАЙМЕР ДО 7</button>
        <button onclick="location.href='page8.html'">ТАЙМЕР ДО 8</button>
        <button onclick="location.href='page9.html'">ТАЙМЕР ДО 9</button>
        <button onclick="location.href='page10.html'">ТАЙМЕР ДО 10</button>
        <button onclick="location.href='page11.html'">ТАЙМЕР ДО 11</button>
        <button onclick="location.href='page12.html'">ТАЙМЕР ДО 12</button>
        <button onclick="location.href='page13.html'">ТАЙМЕР ДО 13</button>
        <button onclick="location.href='page14.html'">ТАЙМЕР ДО 14</button>
        <button onclick="location.href='page15.html'">ТАЙМЕР ДО 15</button>
        <button onclick="location.href='page16.html'">ТАЙМЕР ДО 16</button>
        <button onclick="location.href='page17.html'">ТАЙМЕР ДО 17</button>
        <button onclick="location.href='page18.html'">ТАЙМЕР ДО 18</button>
        <button onclick="location.href='page19.html'">ТАЙМЕР ДО 19</button>
        <button onclick="location.href='page20.html'">ТАЙМЕР ДО 20</button>

    </div>

    <div class="footer">
        Serebushka
    </div>

</div>

<!-- Скрипт для фильтрации кнопок -->
<script>
function filterButtons() {
    // Получаем текст из поиска и переводим в верхний регистр
    const input = document.getElementById('searchInput');
    const filter = input.value.toUpperCase();
    
    // Получаем все кнопки внутри контейнера buttons
    const buttonsGrid = document.getElementById('buttonsGrid');
    const buttons = buttonsGrid.getElementsByTagName('button');

    // Проходимся по каждой кнопке
    for (let i = 0; i < buttons.length; i++) {
        const buttonText = buttons[i].textContent || buttons[i].innerText;
        
        // Если текст кнопки содержит поисковый запрос, показываем её, иначе скрываем
        if (buttonText.toUpperCase().indexOf(filter) > -1) {
            buttons[i].style.display = "";
        } else {
            buttons[i].style.display = "none";
        }
    }
}
</script>

</body>
</html>
